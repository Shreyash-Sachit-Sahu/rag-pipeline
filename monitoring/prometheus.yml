# monitoring/prometheus.yml
# All scrape targets are resolved via Docker internal DNS.
# Service names match docker-compose.yml service keys.
# Ports are read from the .env file at compose time — these are the defaults.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rag_gateway
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: rag_embedder
    static_configs:
      - targets: ["embedder:8001"]
    metrics_path: /metrics

  - job_name: rag_retriever
    static_configs:
      - targets: ["retriever:8002"]
    metrics_path: /metrics

  # redis: add redis_exporter sidecar to scrape Redis metrics